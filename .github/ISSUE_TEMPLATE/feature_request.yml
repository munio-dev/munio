name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include API examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Constraints (YAML format)
        - Solver (Tier 1-3)
        - Policy Check (Tier 4)
        - Guard API
        - Framework Integration
        - CLI
        - Other
