name: universal-credential-paths
description: "Block references to known credential files in any tool argument"
category: ASI05
tier: 1
action: "*"
check:
  type: denylist
  field: "*"
  values:
    - "/etc/shadow"
    - "/proc/self/environ"
    - "/proc/self/"
    # Credential directories (catch archiving/copying entire dirs)
    - ".ssh/"
    - ".aws/"
    - ".gnupg/"
    # Specific credential files
    - ".ssh/id_rsa"
    - ".ssh/id_ed25519"
    - ".ssh/id_ecdsa"
    - ".ssh/id_dsa"
    - ".ssh/authorized_keys"
    - ".aws/credentials"
    - ".git-credentials"
    - ".netrc"
    - ".kube/config"
    - ".docker/config.json"
    - ".env"
    - ".pgpass"
    - ".my.cnf"
    - ".npmrc"
    - ".pypirc"
    - ".htpasswd"
    - "wp-config.php"
    - ".config/gcloud/"
    - ".azure/"
    # CLI tool tokens
    - ".config/gh/"
    - ".config/hub"
    # Desktop keyrings
    - ".local/share/keyrings/"
    - "keyrings/default.keyring"
    # Browser credential stores
    - ".mozilla/firefox/"
    - ".config/chromium/"
    - ".config/google-chrome/"
    - "Login Data"
    - "cookies.sqlite"
    # Shell history/config (may contain exported secrets)
    - ".bashrc"
    - ".zshrc"
    - ".bash_history"
    - ".zsh_history"
    - ".python_history"
    - ".node_repl_history"
  match: contains
  case_sensitive: false
on_violation: block
severity: critical
enabled: true
