name: universal-ssrf-deny
description: "Block access to cloud metadata and internal IPs in any tool argument"
category: ASI02
tier: 1
action: "*"
check:
  type: regex_deny
  field: "*"
  patterns:
    # Cloud metadata endpoints (no scheme required)
    - "169\\.254\\.169\\.254"
    - "metadata\\.google\\.internal"
    - "169\\.254\\.170\\.2"
    # Loopback
    - "\\[::1\\]"
    - "://127\\.0\\.0\\."
    - "://0\\.0\\.0\\.0"
    - "://localhost([:/\\?#]|$)"
    # Private network ranges (in URL context, ://IP and @IP for connection strings)
    - "://10\\.\\d"
    - "://172\\.(1[6-9]|2[0-9]|3[01])\\."
    - "://192\\.168\\."
    - "@10\\.\\d"
    - "@172\\.(1[6-9]|2[0-9]|3[01])\\."
    - "@192\\.168\\."
    - "@127\\."
    - "@localhost\\b"
    # Dangerous schemes
    - "file://"
    - "gopher://"
    - "\\bdata:"
    - "dict://"
    - "ldap://"
    - "tftp://"
    # Kubernetes service discovery
    - "kubernetes\\.default"
    # Hex/octal/decimal IP encoding of critical targets
    - "\\b2852039166\\b"
    - "\\b2130706433\\b"
    - "://0x[0-9a-fA-F]"
    - "://0[0-7]+\\."
    # Known DNS rebinding domains
    - "localtest\\.me"
    - "nip\\.io"
    - "sslip\\.io"
    - "xip\\.io"
    - "burpcollaborator\\.net"
  case_sensitive: false
on_violation: block
severity: critical
enabled: true
