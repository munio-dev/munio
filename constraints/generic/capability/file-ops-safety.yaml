name: capability-file-ops-safety
description: "Block path traversal and sensitive file access in file operation tools"
category: ASI05
tier: 1
actions:
  # Compound patterns — match file-system tools, not generic CRUD
  - "*_file"
  - "*_file_*"
  - "file_*"
  - "*_files"
  - "*_files_*"
  - "*_directory"
  - "*_directory_*"
  - "directory_*"
  - "*_folder"
  - "*_folder_*"
  - "folder_*"
  - "*_dir"
  - "*_dir_*"
  - "dir_*"
  - "*_path"
  - "*_path_*"
  - "path_*"
  - "*filesystem*"
  - "*read_file*"
  - "*write_file*"
  - "*edit_file*"
  - "*move_file*"
  - "*copy_file*"
  - "*rename_file*"
  - "*delete_file*"
  - "*remove_file*"
  - "*create_file*"
  - "*save_file*"
  - "*upload_file*"
  - "*download_file*"
  - "*list_dir*"
  - "*list_folder*"
  - "*list_files*"
  - "*read_multiple*"
  - "mkdir*"
  - "*mkdir*"
  - "*rmdir*"
  - "*unlink*"
  - "*gdrive_*"
  # Bare unix commands (filesystem MCP servers)
  - "cat"
  - "ls"
  - "cp"
  - "mv"
  - "rm"
  - "stat"
  - "head"
  - "tail"
  - "less"
  - "more"
  - "tee"
  - "dd"
  - "touch"
  - "chmod"
  - "chown"
  # CamelCase variants (no underscore)
  - "*readfile*"
  - "*writefile*"
  - "*deletefile*"
  - "*removefile*"
  - "*createfile*"
  - "*copyfile*"
  - "*movefile*"
  - "*renamefile*"
  - "*listdir*"
  - "*listfiles*"
  - "*listdirectory*"
  - "*readdir*"
check:
  type: denylist
  field: "*"
  values:
    # Path traversal
    - "/../"
    - "/.."
    # Sensitive files
    - "/etc/shadow"
    - "/etc/passwd"
    - "/proc/self/environ"
    - "/proc/self/cmdline"
    - ".ssh/"
    - ".env"
    - ".aws/"
    - ".gnupg/"
    - ".npmrc"
    - ".pypirc"
    - ".kube/config"
    - ".docker/config.json"
    - ".git-credentials"
    - ".netrc"
    - ".bash_history"
    - ".zsh_history"
    - ".git/config"
    # System directories
    - "/dev/shm"
    - "/dev/tcp"
    - "/dev/udp"
  match: contains
  case_sensitive: false
on_violation: block
severity: critical
enabled: true
